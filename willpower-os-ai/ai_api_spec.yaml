openapi: "3.0.3"
info:
  title: Willpower OS AI API
  description: |
    AI API ของระบบ Willpower OS สำหรับถาม-ตอบธรรมะด้วย RAG
    และระบบ Feedback เพื่อปรับปรุงคุณภาพคำตอบ
    สถาบันพลังจิตตานุภาพ (Willpower Institute)
  version: "1.0.0"
  contact:
    name: คณะอนุกรรมการ IT สถาบันพลังจิตตานุภาพ

servers:
  - url: http://localhost:8000/api/v1
    description: Development
  - url: https://willpower-os-ai.run.app/api/v1
    description: Production

tags:
  - name: AI Ask
    description: ถาม-ตอบธรรมะด้วย RAG Engine
  - name: AI Feedback
    description: ระบบ Feedback คำตอบ

paths:
  /ai/ask:
    post:
      tags: [AI Ask]
      summary: ถามคำถามธรรมะ
      description: |
        รับคำถามจากผู้ใช้ → ค้นหาคำตอบจากตำราด้วย RAG (Vector Search)
        → สร้างคำตอบด้วย Gemini → ส่งกลับพร้อมแหล่งอ้างอิง
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - question
              properties:
                user_id:
                  type: string
                  format: uuid
                  description: รหัสผู้ใช้
                question:
                  type: string
                  maxLength: 1000
                  description: คำถาม
                  example: "การทำสมาธิเบื้องต้นต้องทำอย่างไร"
                context:
                  type: string
                  description: บริบทเพิ่มเติม (optional)
                  example: "ผมเป็นนักศึกษาเล่ม 1 เพิ่งเริ่มปฏิบัติ"
      responses:
        "200":
          description: ตอบคำถามสำเร็จ
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      answer:
                        type: string
                        description: คำตอบจาก AI
                        example: "การทำสมาธิเบื้องต้น ให้เริ่มจากการนั่งขัดสมาธิ หลับตาเบาๆ กำหนดลมหายใจเข้าออก พร้อมบริกรรมภาวนาว่า 'สัมมา อะระหัง' ครับ"
                      sources:
                        type: array
                        description: แหล่งอ้างอิง
                        items:
                          type: object
                          properties:
                            book_number:
                              type: integer
                              example: 1
                            chapter_number:
                              type: integer
                              example: 3
                            page_number:
                              type: integer
                              example: 45
                            title:
                              type: string
                              example: "บทที่ 3: วิธีการนั่งสมาธิเบื้องต้น"
                            relevance_score:
                              type: number
                              format: float
                              example: 0.92
                      confidence:
                        type: string
                        enum: [high, medium, low]
                        description: ระดับความมั่นใจในคำตอบ
                        example: "high"
                      conversation_id:
                        type: string
                        format: uuid
                        description: ID สำหรับอ้างอิงในการส่ง Feedback
                  error:
                    type: "null"
                  metadata:
                    $ref: "#/components/schemas/Metadata"
        "400":
          description: คำถามไม่ถูกต้อง
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: ไม่พบข้อมูลในตำรา
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      answer:
                        type: string
                        example: "ขออภัยครับ ข้อมูลเรื่องนี้ยังไม่มีในระบบของเรา แนะนำให้ท่านปรึกษาอาจารย์วิทยากรประจำสาขาของท่านโดยตรงครับ"
                      sources:
                        type: array
                        items: {}
                        example: []
                      confidence:
                        type: string
                        example: "low"
                  error:
                    type: "null"
                  metadata:
                    $ref: "#/components/schemas/Metadata"

  /ai/feedback:
    post:
      tags: [AI Feedback]
      summary: ส่ง Feedback ต่อคำตอบ
      description: |
        ผู้ใช้ส่ง 👍 (rating: 1) หรือ 👎 (rating: -1) พร้อมความคิดเห็นเพิ่มเติม
        เพื่อนำไปปรับปรุงคุณภาพการตอบของ AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - conversation_id
                - rating
              properties:
                user_id:
                  type: string
                  format: uuid
                conversation_id:
                  type: string
                  format: uuid
                  description: ID ของคำตอบที่ต้องการให้ Feedback
                rating:
                  type: integer
                  enum: [1, -1]
                  description: "1 = 👍 (ดี), -1 = 👎 (ไม่ดี)"
                  example: 1
                comment:
                  type: string
                  maxLength: 500
                  description: ความคิดเห็นเพิ่มเติม (optional)
                  example: "คำตอบตรงประเด็นและอ้างอิงได้ชัดเจน"
      responses:
        "201":
          description: บันทึก Feedback สำเร็จ
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "ขอบคุณสำหรับ Feedback ของท่านครับ"
                  error:
                    type: "null"
                  metadata:
                    $ref: "#/components/schemas/Metadata"
        "400":
          description: ข้อมูลไม่ถูกต้อง
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    Metadata:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-03-18T10:00:00Z"
        version:
          type: string
          example: "1.0.0"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          type: "null"
        error:
          type: object
          properties:
            code:
              type: string
              example: "BAD_REQUEST"
            message:
              type: string
              example: "กรุณาระบุคำถาม"
        metadata:
          $ref: "#/components/schemas/Metadata"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT Token

security:
  - BearerAuth: []
